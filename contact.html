</head>
<body>

    <div class="page-transition-overlay" id="page-transition"></div>
    <div class="page-overlay" id="page-overlay"></div>

    <header class="top-navbar">
        <div class="navbar-left">
            <div class="menu-toggle" id="menu-open"><i class="fa-solid fa-bars"></i></div>
            <div class="logo-container"><h1 class="logo">Kibi <span>LABEL</span></h1></div>
        </div>
        <div class="navbar-right">
            <div class="theme-toggle" id="theme-toggle" title="Mode sombre"><i class="fa-regular fa-moon"></i></div>
        </div>
    </header>

    <nav class="sidebar-offcanvas" id="sidebar">
        <div class="sidebar-offcanvas-header">
            <h1 class="logo">Kibi <span>LABEL</span></h1>
            <div class="menu-close" id="menu-close"><i class="fa-solid fa-xmark"></i></div>
        </div>
        <ul class="nav-links">
            <li><a href="index.html">Accueil</a></li>
            <li><a href="services.html">Services & Tarifs</a></li>

            <li><a href="a-propos.html">À Propos</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>
    </nav>

    <main class="main-content">
        <section class="page-section">
            <div class="page-header">
                <h2 class="page-title">Nous Contacter</h2>
                <p class="page-subtitle">Une question ? N'hésitez pas à nous écrire</p>
            </div>

            <div class="form-container">
                <form id="contact-form" action="" method="POST">
                    
                    <input type="hidden" name="_subject" value="Nouveau message depuis le site Kibi Label !">
                    <input type="hidden" name="_captcha" value="false">
                    <input type="hidden" name="_template" value="table">
                    <input type="hidden" id="form-next-url" name="_next" value="">
                    
                    <input type="text" name="_honey" style="display:none">

                    <div class="form-group">
                        <label for="name">Nom Complet</label>
                        <input type="text" id="name" name="name" class="form-control" placeholder="Votre nom" required>
                    </div>
                    <div class="form-group">
                        <label for="email">Adresse Email</label>
                        <input type="email" id="email" name="email" class="form-control" placeholder="votre@email.com" required>
                    </div>
                    <div class="form-group">
                        <label for="message">Votre Message</label>
                        <textarea id="message" name="message" class="form-control" placeholder="Comment puis-je vous aider ?" required></textarea>
                    </div>
                    <button type="submit" class="cta-button" style="width: 100%; margin-bottom: 0;">Envoyer le message</button>
                </form>
            </div>
        </section>

        <footer class="bottom-footer">
            <a href="tel:+14189001191" class="contact-item"><i class="fa-solid fa-phone"></i><span>418-900-1191</span></a>
            <a href="https://www.instagram.com/kibi_label/" target="_blank" class="contact-item"><i class="fa-brands fa-instagram"></i><span>@Kibi_label</span></a>
            <a href="https://www.tiktok.com/@kibilabel" target="_blank" class="contact-item"><i class="fa-brands fa-tiktok"></i><span>Kibi Label</span></a>
            <a href="https://snapchat.com/t/vFmJueij" target="_blank" class="contact-item"><i class="fa-brands fa-snapchat"></i><span>Kibi.lashes</span></a>
        </footer>
    </main>

    <script src="script.js"></script>
</body>
</html>
